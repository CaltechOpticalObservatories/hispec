#
# Usage:
#   daemons/hsfei/piaa-gimbalmount -c config/hsfei/hsfei_yjpiaagim.yaml

peer_id: hsfei_yjpiaagim
group_id: hsfei

hardware:
  ip_address: 192.168.29.100
  tcp_port: 10013
  axis: 2
  closed_loop_units: mrad
  open_loop_units: volts
  timeout: 30.0
  retry_count: 3

limits:
  open_loop:
    soft_min: -20.0
    soft_max: 145.0
    hard_min: -25.0
    hard_max: 150.0
  closed_loop:
    soft_min: -9.5
    soft_max: 9.5
    hard_min: -10.0
    hard_max: 10.0

named_positions:
  center: [0.0, 0.0]
  offset1: [1.0, 1.0]
  offset2: [-1.0, -1.0]

logging:
  level: INFO